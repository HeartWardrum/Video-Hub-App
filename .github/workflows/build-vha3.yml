name: Build VHA3 for Windows

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Node 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # 4. 构建前端（防止打包空壳）
      - name: Build Web App
        run: npm run build

      # 5. 打包 Electron（核心步骤）
      - name: Package Windows App
        run: npx electron-builder
        env:
          CI: false

      # 6. 上传构建产物
      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: Video-Hub-App-3-Win11
          path: |
            dist/*.exe
            dist/*.msi
            dist_electron/*.exe
            release/*.exe
            out/*.exe
