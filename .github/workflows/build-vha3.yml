name: Build VHA3 for Windows

on:
  workflow_dispatch: # 手动触发编译

permissions:
  contents: write

jobs:
  build-windows:
    # 指定只在 Windows 环境下运行
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # VHA3 相对稳定支持的版本
          cache: 'npm'

      - name: Install Dependencies
        # 使用 --legacy-peer-deps 解决插件版本冲突
        run: npm install --legacy-peer-deps

      - name: Package Windows App
        # 强制执行 Electron 打包
        run: npm run electron
        env:
          CI: false # 忽略某些非致命的编译警告

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: Video-Hub-App-3-Win11
          # 只抓取生成的 .exe 安装包
          path: |
            dist/*.exe
            dist/*.msi
